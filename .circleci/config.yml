version: 2.1
parameters:
  running-file:
    type: enum
    enum:
      [
        search_fixedasset/searching_full_flow.jmx,
        search_fixedasset/searchingTC4.jmx,
        searching/searchStagingLoginMultipleTime.jmx,
        searching/searchBetaBypassLogin.jmx,
      ]
    default: searching/searchStagingLoginMultipleTime.jmx

setup: true

orbs:
  aws-s3: circleci/aws-s3@3.0.0
  jq: circleci/jq@2.2.0

workflows:
  common-test:
    jobs:
      - job_test

jobs:
  job_test:
    docker:
      - image: cimg/base:current
    circleci_ip_ranges: true # opts the job into the IP ranges feature
    steps:
      - checkout
      - jq/install
      - run:
          name: install qapf-tools
          command: |
            echo "Download qapf"
            asseturl=$(curl -H "Authorization: token ${MINAMI_GITHUB_TOKEN}" https://api.github.com/repos/moneyforward/cqoo-qapf/releases/latest | jq -r '.assets[] | select(.name=="qapf.zip") | .url')
            curl -L -H "Authorization: token ${MINAMI_GITHUB_TOKEN}" -H "Accept:application/octet-stream" ${asseturl} >qapf.zip
            unzip qapf.zip
            chmod +x qapf
      - run:
          name: Conduct performance test
          command: |
            ls -la
            echo "List all workspaces"
            ./qapf lists
            echo "Create workspace"
            ./qapf create -w ${CIRCLE_PROJECT_REPONAME}
            echo "Delete workspace"
            ./qapf delete -w ${CIRCLE_PROJECT_REPONAME}
